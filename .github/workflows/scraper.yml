name: MB-trac Scraper

on:
  schedule:
    # 4x am Tag: 06:00, 12:00, 18:00, 00:00 UTC
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch: # Manuell auslösbar

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Data Directory
        run: mkdir -p data logs

      - name: Run Scraper
        run: python scraper.py --workers 3
        env:
          PYTHONUNBUFFERED: '1'

      - name: Generate Dashboard
        run: python dashboard_generator.py

      - name: Copy Dashboard to docs/
        run: |
          mkdir -p docs
          cp dashboard.html docs/index.html
          cp -r data docs/data 2>/dev/null || true

      - name: Commit & Push Results
        run: |
          git config user.name "MB-trac Bot"
          git config user.email "bot@mbtrac-scraper.github.io"
          git add data/ docs/ dashboard.html
          git diff --staged --quiet || git commit -m "🚜 Scraper Update $(date +'%Y-%m-%d %H:%M UTC')"
          git push

  # GitHub Pages Deployment
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
