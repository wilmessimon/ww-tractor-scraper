name: Traktor Scraper

on:
  schedule:
    # 6x am Tag, alle 4 Stunden: 02:00, 06:00, 10:00, 14:00, 18:00, 22:00 UTC
    - cron: '0 2,6,10,14,18,22 * * *'
  workflow_dispatch: # Manuell auslösbar

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Data Directory
        run: mkdir -p data logs

      - name: Run Scraper
        run: python scraper.py --all-brands --workers 3
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit & Push Results
        run: |
          git config user.name "Traktor Bot"
          git config user.email "bot@traktor-scraper.github.io"
          git add data/
          git diff --staged --quiet || git commit -m "🚜 Scraper Update $(date +'%Y-%m-%d %H:%M UTC') [skip deploy]"
          git push

  # Dashboard lädt Daten live von GitHub Raw - kein Redeploy nötig
